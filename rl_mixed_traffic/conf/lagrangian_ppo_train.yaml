total_steps: 1_500_000
rollout_steps: 4096
save_freq: 50_000
gui: false
out_dir: lagrangian_ppo_results

env:
  sumocfg_path: configs/ring/simulation.sumocfg
  num_vehicles: 4
  num_agents: 1
  enable_safety_layer: true
  disable_sumo_safety: true
  spacing_min: 5.0
  weight_v: 5.0               # stronger velocity tracking (was 1.0)
  weight_s: 0.5
  weight_u: 0.1               # less control penalty (was 0.2)

scenario:
  type: random
  v_cruise: 15.0
  v_low: 2.0
  t_brake: 50.0
  brake_duration: 3.0
  hold_duration: 10.0
  recover_duration: 5.0

agent:
  lr: 3e-4
  gamma: 0.99
  lam: 0.95
  clip_epsilon: 0.15
  k_epochs: 6
  batch_size: 64
  entropy_coef: 0.01
  value_coef: 0.5
  clip_vloss: true
  vf_clip_coef: 0.2
  enable_lagrangian: true
  lambda_init: 0.0
  lambda_lr: 0.01
  lambda_max: 10.0
  violation_tolerance: 0.01
